name: 🌐 Generate 3D Contribution Calendar

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Graph

    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D Contribution Calendar
        uses: yoshi389111/github-profile-3d-contrib@0.7.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ISHUKR41
          SETTING_JSON: |
            {
              "githubUserName": "ISHUKR41",
              "totalCommits": true,
              "backgroundColor": "#0d1117",
              "foregroundColor": "#c9d1d9",
              "contributionColorArray": [
                "#161b22",
                "#0e4429",
                "#006d32",
                "#26a641",
                "#39d353"
              ],
              "type": "NORMAL",
              "topLang": true,
              "fileName": "profile-night-green"
            }

      - name: Commit and Push 3D Graph
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🌐 Auto-update 3D contribution graph [skip ci]"
          git push
