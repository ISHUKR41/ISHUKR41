<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0d1f12"/>
    </linearGradient>
    <linearGradient id="p1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/><stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="p2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#0099BB"/>
    </linearGradient>
    <linearGradient id="p3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C084FC"/><stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="p4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/><stop offset="100%" stop-color="#7EE787"/>
    </linearGradient>
    <linearGradient id="p5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/><stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="p6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B6B"/><stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="p7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="900" height="380" rx="12" fill="url(#bgG)"/>
  <rect x="0.5" y="0.5" width="899" height="379" rx="11.5" fill="none" stroke="#00FF88" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Title -->
  <text x="450" y="34" fill="#00FF88" font-family="'Courier New',monospace" font-size="13" font-weight="900" text-anchor="middle" letter-spacing="5" filter="url(#glow)">◈  CURRENTLY  BUILDING  ◈</text>
  <rect x="20" y="46" width="860" height="1" fill="#00FF88" fill-opacity="0.12"/>

  <!-- Headers -->
  <text x="58" y="66" fill="#8b949e" font-family="monospace" font-size="10" letter-spacing="2">PROJECT</text>
  <text x="390" y="66" fill="#8b949e" font-family="monospace" font-size="10" letter-spacing="2">PROGRESS</text>
  <text x="760" y="66" fill="#8b949e" font-family="monospace" font-size="10" letter-spacing="2" text-anchor="middle">STATUS</text>

  <!-- ── EduQuest 88% ── -->
  <circle cx="32" cy="92" r="5" fill="#00FF88">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="46" y="96" fill="#c9d1d9" font-family="monospace" font-size="13" font-weight="700">🎓 EduQuest</text>
  <rect x="320" y="83" width="380" height="14" rx="7" fill="#161b22"/>
  <rect x="320" y="83" width="1" height="14" rx="7" fill="url(#p1)" filter="url(#glow)">
    <animate attributeName="width" from="1" to="334" dur="1.6s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="715" y="96" fill="#00FF88" font-family="monospace" font-size="11" font-weight="700">88%</text>
  <text x="790" y="96" fill="#FB923C" font-family="monospace" font-size="11" text-anchor="middle">🟡 Building</text>

  <!-- ── Chess Engine 90% ── -->
  <circle cx="32" cy="132" r="5" fill="#00FF88">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <text x="46" y="136" fill="#c9d1d9" font-family="monospace" font-size="13" font-weight="700">♟️  Chess Engine</text>
  <rect x="320" y="123" width="380" height="14" rx="7" fill="#161b22"/>
  <rect x="320" y="123" width="1" height="14" rx="7" fill="url(#p2)">
    <animate attributeName="width" from="1" to="342" dur="1.6s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="715" y="136" fill="#00E5FF" font-family="monospace" font-size="11" font-weight="700">90%</text>
  <text x="790" y="136" fill="#7EE787" font-family="monospace" font-size="11" text-anchor="middle">🟢 Almost Done</text>

  <!-- ── ishu.fun 95% ── -->
  <circle cx="32" cy="172" r="5" fill="#00FF88">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" begin="0.1s" repeatCount="indefinite"/>
  </circle>
  <text x="46" y="176" fill="#c9d1d9" font-family="monospace" font-size="13" font-weight="700">🌐 ishu.fun</text>
  <rect x="320" y="163" width="380" height="14" rx="7" fill="#161b22"/>
  <rect x="320" y="163" width="1" height="14" rx="7" fill="url(#p4)" filter="url(#glow)">
    <animate attributeName="width" from="1" to="361" dur="1.6s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="715" y="176" fill="#00FF88" font-family="monospace" font-size="11" font-weight="700">95%</text>
  <text x="790" y="176" fill="#00FF88" font-family="monospace" font-size="11" text-anchor="middle">✅ LIVE</text>

  <!-- ── BGMIFF 80% ── -->
  <circle cx="32" cy="212" r="5" fill="#00FF88">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <text x="46" y="216" fill="#c9d1d9" font-family="monospace" font-size="13" font-weight="700">🎮 BGMIFF</text>
  <rect x="320" y="203" width="380" height="14" rx="7" fill="#161b22"/>
  <rect x="320" y="203" width="1" height="14" rx="7" fill="url(#p3)">
    <animate attributeName="width" from="1" to="304" dur="1.6s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="715" y="216" fill="#C084FC" font-family="monospace" font-size="11" font-weight="700">80%</text>
  <text x="790" y="216" fill="#7EE787" font-family="monospace" font-size="11" text-anchor="middle">🟢 Almost Done</text>

  <!-- ── TypeBlitz 65% ── -->
  <circle cx="32" cy="252" r="5" fill="#FB923C">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <text x="46" y="256" fill="#c9d1d9" font-family="monospace" font-size="13" font-weight="700">⌨️  TypeBlitz</text>
  <rect x="320" y="243" width="380" height="14" rx="7" fill="#161b22"/>
  <rect x="320" y="243" width="1" height="14" rx="7" fill="url(#p5)">
    <animate attributeName="width" from="1" to="247" dur="1.6s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="715" y="256" fill="#FB923C" font-family="monospace" font-size="11" font-weight="700">65%</text>
  <text x="790" y="256" fill="#FB923C" font-family="monospace" font-size="11" text-anchor="middle">🟡 Building</text>

  <!-- ── GullyEsports 60% ── -->
  <circle cx="32" cy="292" r="5" fill="#FB923C">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.9s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <text x="46" y="296" fill="#c9d1d9" font-family="monospace" font-size="13" font-weight="700">🏟️  GullyEsports</text>
  <rect x="320" y="283" width="380" height="14" rx="7" fill="#161b22"/>
  <rect x="320" y="283" width="1" height="14" rx="7" fill="url(#p6)">
    <animate attributeName="width" from="1" to="228" dur="1.6s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="715" y="296" fill="#FF6B6B" font-family="monospace" font-size="11" font-weight="700">60%</text>
  <text x="790" y="296" fill="#FB923C" font-family="monospace" font-size="11" text-anchor="middle">🟡 Building</text>

  <!-- ── FinVault 50% ── -->
  <circle cx="32" cy="332" r="5" fill="#FB923C">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.1s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <text x="46" y="336" fill="#c9d1d9" font-family="monospace" font-size="13" font-weight="700">💰 FinVault</text>
  <rect x="320" y="323" width="380" height="14" rx="7" fill="#161b22"/>
  <rect x="320" y="323" width="1" height="14" rx="7" fill="url(#p7)">
    <animate attributeName="width" from="1" to="190" dur="1.6s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="715" y="336" fill="#00E5FF" font-family="monospace" font-size="11" font-weight="700">50%</text>
  <text x="790" y="336" fill="#FB923C" font-family="monospace" font-size="11" text-anchor="middle">🟡 Building</text>

  <!-- Bottom line -->
  <rect x="20" y="360" width="860" height="1" fill="#00FF88" fill-opacity="0.12"/>
  <text x="450" y="374" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="2">BUILD · SHIP · REPEAT · NEVER STOP ⚡</text>
</svg>
