<svg width="900" height="190" viewBox="0 0 900 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="frame"><rect width="900" height="190" rx="10"/></clipPath>
    <filter id="nameGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="190" rx="10" fill="#000000"/>
  <rect x="0.5" y="0.5" width="899" height="189" rx="9.5" fill="none" stroke="#00FF88" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Matrix rain streams — clipPath keeps them in bounds -->
  <g clip-path="url(#frame)" font-family="monospace" font-size="13">

    <!-- Col 1 x=18 dur=3.2s begin=0s GREEN -->
    <g><text x="18" y="0" fill="#00FF88">T</text><text x="18" y="13" fill="#00cc55">S</text><text x="18" y="26" fill="#008833">0</text><text x="18" y="39" fill="#005522">1</text><text x="18" y="52" fill="#002211">#</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="3.2s" begin="0s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 2 x=68 dur=4.0s begin=0.5s CYAN -->
    <g><text x="68" y="0" fill="#00E5FF">I</text><text x="68" y="13" fill="#00AABB">H</text><text x="68" y="26" fill="#007788">U</text><text x="68" y="39" fill="#003344">K</text><text x="68" y="52" fill="#001122">R</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="4.0s" begin="0.5s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 3 x=118 dur=2.8s begin=1.0s GREEN -->
    <g><text x="118" y="0" fill="#00FF88">&gt;</text><text x="118" y="13" fill="#00cc55">=</text><text x="118" y="26" fill="#008833">/</text><text x="118" y="39" fill="#005522">*</text><text x="118" y="52" fill="#002211">+</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="2.8s" begin="1.0s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 4 x=168 dur=5.0s begin=1.5s CYAN -->
    <g><text x="168" y="0" fill="#00E5FF">f</text><text x="168" y="13" fill="#00AABB">n</text><text x="168" y="26" fill="#007788">c</text><text x="168" y="39" fill="#003344">t</text><text x="168" y="52" fill="#001122">{</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="5.0s" begin="1.5s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 5 x=218 dur=3.6s begin=2.0s GREEN -->
    <g><text x="218" y="0" fill="#00FF88">l</text><text x="218" y="13" fill="#00cc55">e</text><text x="218" y="26" fill="#008833">t</text><text x="218" y="39" fill="#005522">=</text><text x="218" y="52" fill="#002211">;</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="3.6s" begin="2.0s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 6 x=268 dur=2.5s begin=0.3s CYAN -->
    <g><text x="268" y="0" fill="#00E5FF">c</text><text x="268" y="13" fill="#00AABB">o</text><text x="268" y="26" fill="#007788">n</text><text x="268" y="39" fill="#003344">s</text><text x="268" y="52" fill="#001122">t</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="2.5s" begin="0.3s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 7 x=318 dur=4.4s begin=0.8s GREEN -->
    <g><text x="318" y="0" fill="#00FF88">0</text><text x="318" y="13" fill="#00cc55">1</text><text x="318" y="26" fill="#008833">2</text><text x="318" y="39" fill="#005522">3</text><text x="318" y="52" fill="#002211">4</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="4.4s" begin="0.8s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 8 x=368 dur=3.0s begin=1.3s CYAN -->
    <g><text x="368" y="0" fill="#00E5FF">C</text><text x="368" y="13" fill="#00AABB">o</text><text x="368" y="26" fill="#007788">n</text><text x="368" y="39" fill="#003344">s</text><text x="368" y="52" fill="#001122">t</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="3.0s" begin="1.3s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 9 x=418 dur=5.5s begin=1.8s GREEN -->
    <g><text x="418" y="0" fill="#00FF88">(</text><text x="418" y="13" fill="#00cc55">)</text><text x="418" y="26" fill="#008833">{</text><text x="418" y="39" fill="#005522">}</text><text x="418" y="52" fill="#002211">;</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="5.5s" begin="1.8s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 10 x=468 dur=3.8s begin=2.3s CYAN -->
    <g><text x="468" y="0" fill="#00E5FF">i</text><text x="468" y="13" fill="#00AABB">m</text><text x="468" y="26" fill="#007788">p</text><text x="468" y="39" fill="#003344">o</text><text x="468" y="52" fill="#001122">r</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="3.8s" begin="2.3s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 11 x=518 dur=2.6s begin=0.6s GREEN -->
    <g><text x="518" y="0" fill="#00FF88">a</text><text x="518" y="13" fill="#00cc55">s</text><text x="518" y="26" fill="#008833">y</text><text x="518" y="39" fill="#005522">n</text><text x="518" y="52" fill="#002211">c</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="2.6s" begin="0.6s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 12 x=568 dur=4.2s begin=1.1s CYAN -->
    <g><text x="568" y="0" fill="#00E5FF">a</text><text x="568" y="13" fill="#00AABB">w</text><text x="568" y="26" fill="#007788">a</text><text x="568" y="39" fill="#003344">i</text><text x="568" y="52" fill="#001122">t</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="4.2s" begin="1.1s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 13 x=618 dur=3.4s begin=1.6s GREEN -->
    <g><text x="618" y="0" fill="#00FF88">T</text><text x="618" y="13" fill="#00cc55">y</text><text x="618" y="26" fill="#008833">p</text><text x="618" y="39" fill="#005522">e</text><text x="618" y="52" fill="#002211">S</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="3.4s" begin="1.6s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 14 x=668 dur=5.2s begin=2.1s CYAN -->
    <g><text x="668" y="0" fill="#00E5FF">8</text><text x="668" y="13" fill="#00AABB">7</text><text x="668" y="26" fill="#007788">%</text><text x="668" y="39" fill="#003344">I</text><text x="668" y="52" fill="#001122">I</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="5.2s" begin="2.1s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 15 x=718 dur=2.9s begin=0.4s GREEN -->
    <g><text x="718" y="0" fill="#00FF88">T</text><text x="718" y="13" fill="#00cc55">P</text><text x="718" y="26" fill="#008833">a</text><text x="718" y="39" fill="#005522">t</text><text x="718" y="52" fill="#002211">n</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="2.9s" begin="0.4s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 16 x=768 dur=4.6s begin=0.9s CYAN -->
    <g><text x="768" y="0" fill="#00E5FF">r</text><text x="768" y="13" fill="#00AABB">i</text><text x="768" y="26" fill="#007788">p</text><text x="768" y="39" fill="#003344">t</text><text x="768" y="52" fill="#001122">=</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="4.6s" begin="0.9s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 17 x=818 dur=3.2s begin=1.4s GREEN -->
    <g><text x="818" y="0" fill="#00FF88">B</text><text x="818" y="13" fill="#00cc55">u</text><text x="818" y="26" fill="#008833">i</text><text x="818" y="39" fill="#005522">l</text><text x="818" y="52" fill="#002211">d</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="3.2s" begin="1.4s" repeatCount="indefinite" calcMode="linear"/></g>

    <!-- Col 18 x=868 dur=4.0s begin=1.9s CYAN -->
    <g><text x="868" y="0" fill="#00E5FF">S</text><text x="868" y="13" fill="#00AABB">h</text><text x="868" y="26" fill="#007788">i</text><text x="868" y="39" fill="#003344">p</text><text x="868" y="52" fill="#001122">!</text>
    <animateTransform attributeName="transform" type="translate" from="0,-65" to="0,210" dur="4.0s" begin="1.9s" repeatCount="indefinite" calcMode="linear"/></g>

  </g>

  <!-- Dark overlay in center for readability -->
  <rect x="100" y="52" width="700" height="86" rx="6" fill="#000000" fill-opacity="0.72"/>

  <!-- Corner decorations -->
  <path d="M10 10 L36 10 L36 12 L12 12 L12 36 L10 36Z" fill="#00FF88" opacity="0.6"/>
  <path d="M890 10 L864 10 L864 12 L888 12 L888 36 L890 36Z" fill="#00FF88" opacity="0.6"/>
  <path d="M10 180 L36 180 L36 178 L12 178 L12 154 L10 154Z" fill="#00FF88" opacity="0.6"/>
  <path d="M890 180 L864 180 L864 178 L888 178 L888 154 L890 154Z" fill="#00FF88" opacity="0.6"/>

  <!-- Main name with neon glow -->
  <text x="450" y="96" fill="#00FF88" font-family="'Courier New',Courier,monospace" font-size="58" font-weight="900" text-anchor="middle" letter-spacing="8" filter="url(#nameGlow)">
    ISHU KUMAR
    <animate attributeName="opacity" values="1;0.88;1" dur="2.5s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="122" fill="#8b949e" font-family="'Courier New',monospace" font-size="13" text-anchor="middle" letter-spacing="3">IIT PATNA  ·  FULL STACK DEV  ·  TYPESCRIPT 87%  ·  INDIA 🇮🇳</text>

  <!-- Animated cursor line -->
  <rect x="360" y="136" width="0" height="2" rx="1" fill="#00FF88">
    <animate attributeName="width" from="0" to="180" dur="2s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" begin="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Status dots -->
  <circle cx="30" cy="165" r="4.5" fill="#00FF88">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="42" y="169" fill="#00FF88" font-family="monospace" font-size="10" letter-spacing="1" filter="url(#subtleGlow)">ACTIVE</text>

  <circle cx="820" cy="165" r="4.5" fill="#00E5FF">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <text x="832" y="169" fill="#00E5FF" font-family="monospace" font-size="10" letter-spacing="1">LIVE</text>
</svg>
