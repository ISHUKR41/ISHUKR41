<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBanner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="30%" stop-color="#000d04"/>
      <stop offset="60%" stop-color="#002210"/>
      <stop offset="100%" stop-color="#000000"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="0%;100%;0%" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="gTitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="40%" stop-color="#00E5FF"/>
      <stop offset="70%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#7EE787"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#003311" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="url(#bgBanner)"/>
  <!-- Center glow -->
  <ellipse cx="450" cy="90" rx="360" ry="80" fill="url(#centerGlow)"/>

  <!-- Animated border -->
  <rect x="1" y="1" width="898" height="178" rx="10" fill="none" stroke="#00FF88" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="60" x2="900" y2="60" stroke="#00FF88" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#00FF88" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="300" y1="0" x2="300" y2="180" stroke="#00FF88" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="180" stroke="#00FF88" stroke-width="0.3" stroke-opacity="0.08"/>

  <!-- Floating particles -->
  <circle cx="60" cy="35" r="2" fill="#00FF88" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="35;28;35" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="840" cy="45" r="1.5" fill="#00E5FF" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="45;38;45" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="145" r="1.5" fill="#C084FC" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="780" cy="140" r="2" fill="#00FF88" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="140;148;140" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="18" r="1.5" fill="#FB923C" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="90" r="1" fill="#00FF88" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="90" r="1" fill="#00E5FF" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner decorators -->
  <path d="M 8 8 L 34 8 L 34 10 L 10 10 L 10 34 L 8 34 Z" fill="#00FF88" opacity="0.5"/>
  <path d="M 892 8 L 866 8 L 866 10 L 890 10 L 890 34 L 892 34 Z" fill="#00FF88" opacity="0.5"/>
  <path d="M 8 172 L 34 172 L 34 170 L 10 170 L 10 146 L 8 146 Z" fill="#00FF88" opacity="0.5"/>
  <path d="M 892 172 L 866 172 L 866 170 L 890 170 L 890 146 L 892 146 Z" fill="#00FF88" opacity="0.5"/>

  <!-- Main title — ISHU KUMAR -->
  <text x="450" y="82" fill="url(#gTitle)" font-family="'Courier New',Courier,monospace" font-size="54" font-weight="900" text-anchor="middle" letter-spacing="10" filter="url(#neonGlow)">ISHU KUMAR
    <animate attributeName="opacity" values="1;0.85;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle line 1 -->
  <text x="450" y="110" fill="#8b949e" font-family="'Courier New',monospace" font-size="13" text-anchor="middle" letter-spacing="3" filter="url(#softGlow)">IIT  PATNA  ·  FULL  STACK  DEV  ·  TYPESCRIPT  87%  ·  INDIA  🇮🇳</text>

  <!-- Subtitle line 2 -->
  <text x="450" y="134" fill="#00FF88" font-family="monospace" font-size="11" text-anchor="middle" letter-spacing="5" opacity="0">
    BUILD · SHIP · REPEAT · NEVER · STOP · ⚡
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" begin="1s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="134" fill="#00E5FF" font-family="monospace" font-size="11" text-anchor="middle" letter-spacing="5" opacity="0">
    OPEN  TO  INTERNSHIP  ·  FREELANCE  ·  COLLABS  🤝
    <animate attributeName="opacity" values="0;0;1;0" dur="4s" begin="3s" repeatCount="indefinite"/>
  </text>

  <!-- Blinking cursor indicator -->
  <rect x="430" y="158" width="40" height="2" rx="1" fill="#00FF88">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="width" values="40;80;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="430;410;430" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Status indicator dot -->
  <circle cx="26" cy="160" r="5" fill="#00FF88">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="38" y="164" fill="#00FF88" font-family="monospace" font-size="9" letter-spacing="1">ACTIVE</text>
  <circle cx="860" cy="160" r="5" fill="#00E5FF">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="870" y="164" fill="#00E5FF" font-family="monospace" font-size="9" letter-spacing="1">LIVE</text>
</svg>
