<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgIIT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
    <filter id="gIIT"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gIIT2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <!-- Full circle textPath: center (140,120) radius 100 -->
    <path id="ringText" d="M 40,120 a 100,100 0 1,1 200,0 a 100,100 0 1,1 -200,0"/>
    <!-- Inner circle path for smaller text -->
    <path id="ringText2" d="M 66,120 a 74,74 0 1,1 148,0 a 74,74 0 1,1 -148,0"/>
    <radialGradient id="badgeBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2535"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="240" rx="12" fill="url(#bgIIT)"/>
  <rect x="0.5" y="0.5" width="899" height="239" rx="11.5" fill="none" stroke="#C084FC" stroke-width="1.5" stroke-opacity="0.35">
    <animate attributeName="stroke-opacity" values="0.35;0.8;0.35" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- ─── LEFT: BADGE (center 140, 120) ─── -->

  <!-- Outer pulsing glow -->
  <circle cx="140" cy="120" r="108" fill="url(#glowGrad)">
    <animate attributeName="r" values="108;118;108" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Rotating dashed outer ring -->
  <circle cx="140" cy="120" r="110" fill="none" stroke="#C084FC" stroke-width="2" stroke-dasharray="8 6" stroke-opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 140 120" to="360 140 120" dur="20s" repeatCount="indefinite"/>
  </circle>

  <!-- Static outer ring border -->
  <circle cx="140" cy="120" r="103" fill="none" stroke="#C084FC" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Circular text — rotates slowly -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 140 120" to="-360 140 120" dur="40s" repeatCount="indefinite"/>
    <text font-family="'Courier New',monospace" font-size="9.5" fill="#C084FC" letter-spacing="3.5" font-weight="700">
      <textPath href="#ringText" xlink:href="#ringText" startOffset="0%">INDIAN INSTITUTE OF TECHNOLOGY PATNA ✦ </textPath>
    </text>
  </g>

  <!-- Inner decorative rings -->
  <circle cx="140" cy="120" r="88" fill="none" stroke="#C084FC" stroke-width="0.8" stroke-opacity="0.2"/>
  <circle cx="140" cy="120" r="84" fill="url(#badgeBg)"/>
  <circle cx="140" cy="120" r="84" fill="none" stroke="#00FF88" stroke-width="1.5" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner text ring — counter-rotates -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 140 120" to="360 140 120" dur="35s" repeatCount="indefinite"/>
    <text font-family="monospace" font-size="8" fill="#8b949e" letter-spacing="2.2">
      <textPath href="#ringText2" xlink:href="#ringText2" startOffset="0%">CSE · 2023 · 2024 · 2025 · 2026 · 2027 · </textPath>
    </text>
  </g>

  <!-- Core content -->
  <circle cx="140" cy="120" r="62" fill="#0d1117"/>

  <!-- "IIT" large text -->
  <text x="140" y="105" fill="#00FF88" font-family="'Courier New',monospace" font-size="30" font-weight="900" text-anchor="middle" filter="url(#gIIT)">IIT</text>
  <text x="140" y="105" fill="#00FF88" font-family="'Courier New',monospace" font-size="30" font-weight="900" text-anchor="middle">
    IIT
    <animate attributeName="opacity" values="1;0.8;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- "PATNA" text -->
  <text x="140" y="128" fill="#C084FC" font-family="'Courier New',monospace" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="4">PATNA</text>

  <!-- Divider line -->
  <line x1="100" y1="136" x2="180" y2="136" stroke="#00FF88" stroke-width="1" stroke-opacity="0.4"/>

  <!-- NIRF and batch -->
  <text x="140" y="152" fill="#00E5FF" font-family="monospace" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1">NIRF #23 · CSE 2027</text>

  <!-- ─── RIGHT: INFO SECTION (x=290 to x=880) ─── -->
  <rect x="295" y="18" width="590" height="204" rx="8" fill="#161b22" fill-opacity="0.5"/>
  <rect x="295" y="18" width="4" height="204" rx="2" fill="#C084FC"/>

  <!-- Title -->
  <text x="590" y="44" fill="#C084FC" font-family="'Courier New',monospace" font-size="14" font-weight="900" text-anchor="middle" letter-spacing="4" filter="url(#gIIT2)">🏛️  IIT PATNA</text>
  <text x="590" y="60" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="2">INDIAN INSTITUTE OF TECHNOLOGY PATNA</text>
  <rect x="315" y="68" width="556" height="1" fill="#C084FC" fill-opacity="0.15"/>

  <!-- Info rows with animated progress bars -->
  <!-- Row 1: Degree -->
  <text x="318" y="88" fill="#8b949e" font-family="monospace" font-size="10" letter-spacing="1">DEGREE</text>
  <text x="440" y="88" fill="#c9d1d9" font-family="monospace" font-size="11" font-weight="700">B.Tech Computer Science &amp; Engineering</text>

  <!-- Row 2: Batch -->
  <text x="318" y="110" fill="#8b949e" font-family="monospace" font-size="10" letter-spacing="1">BATCH</text>
  <text x="440" y="110" fill="#00FF88" font-family="monospace" font-size="11" font-weight="700">2023  →  2027  (Year 3 of 4)</text>
  <!-- Progress bar -->
  <rect x="440" y="114" width="200" height="4" rx="2" fill="#161b22"/>
  <rect x="440" y="114" width="0" height="4" rx="2" fill="#00FF88">
    <animate attributeName="width" from="0" to="150" dur="2s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="645" y="118" fill="#00FF88" font-family="monospace" font-size="9">75%</text>

  <!-- Row 3: NIRF -->
  <text x="318" y="136" fill="#8b949e" font-family="monospace" font-size="10" letter-spacing="1">NIRF</text>
  <text x="440" y="136" fill="#FB923C" font-family="monospace" font-size="11" font-weight="700">#23 in India  ·  Est. 2008</text>

  <!-- Row 4: Roll -->
  <text x="318" y="158" fill="#8b949e" font-family="monospace" font-size="10" letter-spacing="1">ROLL NO</text>
  <text x="440" y="158" fill="#00E5FF" font-family="monospace" font-size="11" font-weight="700">2312res305</text>

  <!-- Row 5: Mail -->
  <text x="318" y="180" fill="#8b949e" font-family="monospace" font-size="10" letter-spacing="1">IIT MAIL</text>
  <text x="440" y="180" fill="#c9d1d9" font-family="monospace" font-size="11">ishu_2312res305@iitp.ac.in</text>

  <!-- Motto -->
  <rect x="315" y="190" width="556" height="1" fill="#C084FC" fill-opacity="0.12"/>
  <text x="590" y="207" fill="#C084FC" font-family="monospace" font-size="11" text-anchor="middle" letter-spacing="2" font-style="italic">विद्यार्थी लभते विद्याम्  —  "The student obtains knowledge"</text>

  <!-- Vertical divider -->
  <line x1="280" y1="18" x2="280" y2="222" stroke="#C084FC" stroke-width="1" stroke-opacity="0.15"/>
</svg>
