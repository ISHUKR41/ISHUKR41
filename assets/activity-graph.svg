<svg width="900" height="210" viewBox="0 0 900 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgAG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#090d13"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#00FF88" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="areaFill2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="gAG"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gAG2"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <!-- Reveal clip — animates left to right -->
    <clipPath id="revealAG">
      <rect x="44" y="0" height="210" width="0">
        <animate attributeName="width" from="0" to="812" dur="3.2s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="900" height="210" rx="12" fill="url(#bgAG)"/>
  <rect x="0.5" y="0.5" width="899" height="209" rx="11.5" fill="none" stroke="#00FF88" stroke-width="1.2" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.3;0.65;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Title -->
  <text x="450" y="26" fill="#00FF88" font-family="'Courier New',monospace" font-size="12" font-weight="900" text-anchor="middle" letter-spacing="5" filter="url(#gAG2)">◈  CONTRIBUTION  ACTIVITY  GRAPH  ◈</text>
  <rect x="20" y="34" width="860" height="1" fill="#00FF88" fill-opacity="0.1"/>

  <!-- Y-axis labels -->
  <text x="40" y="58"  fill="#8b949e" font-family="monospace" font-size="9" text-anchor="end">60</text>
  <text x="40" y="88"  fill="#8b949e" font-family="monospace" font-size="9" text-anchor="end">45</text>
  <text x="40" y="118" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="end">30</text>
  <text x="40" y="148" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="end">15</text>
  <text x="40" y="168" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="end">0</text>

  <!-- Y-axis grid lines -->
  <line x1="44" y1="55"  x2="856" y2="55"  stroke="#21262d" stroke-width="1"/>
  <line x1="44" y1="85"  x2="856" y2="85"  stroke="#21262d" stroke-width="1"/>
  <line x1="44" y1="115" x2="856" y2="115" stroke="#21262d" stroke-width="1"/>
  <line x1="44" y1="145" x2="856" y2="145" stroke="#21262d" stroke-width="1"/>
  <line x1="44" y1="165" x2="856" y2="165" stroke="#30363d" stroke-width="1"/>

  <!-- X-axis baseline -->
  <line x1="44" y1="165" x2="856" y2="165" stroke="#30363d" stroke-width="1.5"/>

  <!--
    Data: 11 months, Aug 2025 to Jun 2026
    Commits: 45, 38, 52, 30, 25, 48, 55, 42, 38, 61, 20
    Max=61, chart height (55→165)=110px
    y = 165 - (commits/61)*110
    X range: 44 to 856, 11 points, spacing=81.2

    x0=44,  y0=165-81  =84   (Aug: 45)
    x1=125, y1=165-68.5=96.5 (Sep: 38)
    x2=206, y2=165-93.7=71.3 (Oct: 52)
    x3=287, y3=165-54  =111  (Nov: 30)
    x4=368, y4=165-45  =120  (Dec: 25)
    x5=449, y5=165-86.5=78.5 (Jan: 48)
    x6=530, y6=165-99  =66   (Feb: 55)
    x7=611, y7=165-75.7=89.3 (Mar: 42)
    x8=692, y8=165-68.5=96.5 (Apr: 38)
    x9=773, y9=165-110 =55   (May: 61)
    x10=856,y10=165-36 =129  (Jun: 20 partial)
  -->

  <!-- Area fill (clipped reveal) -->
  <path clip-path="url(#revealAG)"
    d="M 44,165 L 44,84 C 65,84 104,96.5 125,96.5 C 146,96.5 185,71.3 206,71.3 C 227,71.3 266,111 287,111 C 308,111 347,120 368,120 C 389,120 428,78.5 449,78.5 C 470,78.5 509,66 530,66 C 551,66 590,89.3 611,89.3 C 632,89.3 671,96.5 692,96.5 C 713,96.5 752,55 773,55 C 794,55 835,129 856,129 L 856,165 Z"
    fill="url(#areaFill)"/>

  <!-- Glow line (clipped reveal) -->
  <path clip-path="url(#revealAG)"
    d="M 44,84 C 65,84 104,96.5 125,96.5 C 146,96.5 185,71.3 206,71.3 C 227,71.3 266,111 287,111 C 308,111 347,120 368,120 C 389,120 428,78.5 449,78.5 C 470,78.5 509,66 530,66 C 551,66 590,89.3 611,89.3 C 632,89.3 671,96.5 692,96.5 C 713,96.5 752,55 773,55 C 794,55 835,129 856,129"
    fill="none" stroke="#00FF88" stroke-width="3.5" stroke-linejoin="round" filter="url(#gAG)"/>

  <!-- Crisp line on top -->
  <path clip-path="url(#revealAG)"
    d="M 44,84 C 65,84 104,96.5 125,96.5 C 146,96.5 185,71.3 206,71.3 C 227,71.3 266,111 287,111 C 308,111 347,120 368,120 C 389,120 428,78.5 449,78.5 C 470,78.5 509,66 530,66 C 551,66 590,89.3 611,89.3 C 632,89.3 671,96.5 692,96.5 C 713,96.5 752,55 773,55 C 794,55 835,129 856,129"
    fill="none" stroke="#00FF88" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Data point dots (appear after reveal, pulsing) -->
  <circle cx="44"  cy="84"   r="4" fill="#00FF88" filter="url(#gAG2)"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/></circle>
  <circle cx="125" cy="96.5" r="4" fill="#00FF88" filter="url(#gAG2)"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.2s" fill="freeze"/></circle>
  <circle cx="206" cy="71.3" r="5" fill="#00E5FF" filter="url(#gAG)"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.7s" fill="freeze"/></circle>
  <circle cx="287" cy="111"  r="4" fill="#00FF88" filter="url(#gAG2)"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.1s" fill="freeze"/></circle>
  <circle cx="368" cy="120"  r="4" fill="#00FF88" filter="url(#gAG2)"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.4s" fill="freeze"/></circle>
  <circle cx="449" cy="78.5" r="4" fill="#00FF88" filter="url(#gAG2)"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.8s" fill="freeze"/></circle>
  <circle cx="530" cy="66"   r="5" fill="#00E5FF" filter="url(#gAG)"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.1s" fill="freeze"/></circle>
  <circle cx="611" cy="89.3" r="4" fill="#00FF88" filter="url(#gAG2)"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.4s" fill="freeze"/></circle>
  <circle cx="692" cy="96.5" r="4" fill="#00FF88" filter="url(#gAG2)"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.7s" fill="freeze"/></circle>
  <!-- PEAK: May 61 commits — special highlight -->
  <circle cx="773" cy="55"   r="7" fill="#FB923C" filter="url(#gAG)">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.9s" fill="freeze"/>
    <animate attributeName="r" values="7;10;7" dur="2s" begin="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="856" cy="129"  r="4" fill="#00FF88" filter="url(#gAG2)"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/></circle>

  <!-- Peak label -->
  <text x="773" y="48" fill="#FB923C" font-family="monospace" font-size="9" text-anchor="middle" font-weight="700">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.2s" fill="freeze"/>
    PEAK 61
  </text>

  <!-- X-axis month labels -->
  <text x="44"  y="179" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">Aug</text>
  <text x="125" y="179" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">Sep</text>
  <text x="206" y="179" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">Oct</text>
  <text x="287" y="179" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">Nov</text>
  <text x="368" y="179" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">Dec</text>
  <text x="449" y="179" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">Jan</text>
  <text x="530" y="179" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">Feb</text>
  <text x="611" y="179" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">Mar</text>
  <text x="692" y="179" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">Apr</text>
  <text x="773" y="179" fill="#FB923C" font-family="monospace" font-size="9" text-anchor="middle" font-weight="700">May</text>
  <text x="856" y="179" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">Jun</text>
  <text x="449" y="197" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="2">Aug 2025  →  Jun 2026  ·  400+ Total Commits  ·  Building Daily ⚡</text>
</svg>
