<svg width="900" height="310" viewBox="0 0 900 310" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a0f"/>
      <stop offset="50%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#060a0f"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88">
        <animate attributeName="stop-color" values="#00FF88;#00E5FF;#C084FC;#00FF88" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#00E5FF">
        <animate attributeName="stop-color" values="#00E5FF;#C084FC;#FB923C;#00E5FF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#C084FC">
        <animate attributeName="stop-color" values="#C084FC;#00FF88;#00E5FF;#C084FC" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="heroGlow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="lg"><feGaussianBlur stdDeviation="14" result="b"/><feMerge><feMergeNode in="b"/></feMerge></filter>
    <clipPath id="heroBounds"><rect width="900" height="310" rx="14"/></clipPath>
  </defs>

  <!-- BG -->
  <rect width="900" height="310" rx="14" fill="url(#heroBg)"/>

  <!-- Deep bg glows -->
  <circle cx="180" cy="140" r="160" fill="#00FF88" filter="url(#lg)" opacity="0.08"/>
  <circle cx="720" cy="170" r="180" fill="#C084FC" filter="url(#lg)" opacity="0.08"/>
  <circle cx="450" cy="60"  r="120" fill="#00E5FF" filter="url(#lg)" opacity="0.06"/>

  <!-- Subtle grid -->
  <g clip-path="url(#heroBounds)" opacity="0.04" stroke="#00FF88" stroke-width="0.5">
    <line x1="0"   y1="50"  x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0"   y1="150" x2="900" y2="150"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0"   y1="250" x2="900" y2="250"/>
    <line x1="100" y1="0"   x2="100" y2="310"/><line x1="200" y1="0" x2="200" y2="310"/>
    <line x1="300" y1="0"   x2="300" y2="310"/><line x1="400" y1="0" x2="400" y2="310"/>
    <line x1="500" y1="0"   x2="500" y2="310"/><line x1="600" y1="0" x2="600" y2="310"/>
    <line x1="700" y1="0"   x2="700" y2="310"/><line x1="800" y1="0" x2="800" y2="310"/>
  </g>

  <!-- Scanning line -->
  <g clip-path="url(#heroBounds)">
    <line x1="0" y1="0" x2="900" y2="0" stroke="#00FF88" stroke-width="1.5" stroke-opacity="0.4">
      <animateTransform attributeName="transform" type="translate" from="0,-2" to="0,314" dur="5s" repeatCount="indefinite" calcMode="linear"/>
    </line>
  </g>

  <!-- Floating particles -->
  <circle cx="80"  cy="45"  r="2" fill="#00FF88" opacity="0.5"><animate attributeName="cy" values="45;35;45" dur="4.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="820" cy="70"  r="1.5" fill="#00E5FF" opacity="0.4"><animate attributeName="cy" values="70;58;70" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="150" cy="250" r="2" fill="#C084FC" opacity="0.4"><animate attributeName="cx" values="150;160;150" dur="5.1s" repeatCount="indefinite"/></circle>
  <circle cx="760" cy="240" r="2" fill="#FB923C" opacity="0.4"><animate attributeName="cy" values="240;228;240" dur="4.7s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="290" r="1.5" fill="#00FF88" opacity="0.3"><animate attributeName="cx" values="450;462;450" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="30"  cy="170" r="1.5" fill="#00E5FF" opacity="0.4"><animate attributeName="cy" values="170;158;170" dur="3.8s" repeatCount="indefinite"/></circle>
  <circle cx="870" cy="150" r="2" fill="#C084FC" opacity="0.3"><animate attributeName="cy" values="150;140;150" dur="4.3s" repeatCount="indefinite"/></circle>

  <!-- ── TOP BADGE ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.2s" fill="freeze"/>
    <rect x="330" y="18" width="240" height="22" rx="11" fill="#00FF88" fill-opacity="0.12" stroke="#00FF88" stroke-width="1" stroke-opacity="0.4"/>
    <text x="450" y="33" fill="#00FF88" font-family="'Courier New',monospace" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="3">⚡  FULL STACK DEVELOPER</text>
  </g>

  <!-- ── MAIN NAME ── -->
  <text x="450" y="110" fill="url(#nameGrad)" font-family="'Courier New',Courier,monospace" font-size="72" font-weight="900" text-anchor="middle" letter-spacing="8" filter="url(#heroGlow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.5s" fill="freeze"/>
    ISHU KUMAR
  </text>
  <!-- Crisp layer on top -->
  <text x="450" y="110" fill="url(#nameGrad)" font-family="'Courier New',Courier,monospace" font-size="72" font-weight="900" text-anchor="middle" letter-spacing="8" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.5s" fill="freeze"/>
    ISHU KUMAR
  </text>

  <!-- ── SUBTITLE ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.1s" fill="freeze"/>
    <text x="450" y="140" fill="#8b949e" font-family="'Courier New',monospace" font-size="14" font-weight="600" text-anchor="middle" letter-spacing="2">
      IIT Patna  ·  CSE 2027  ·  TypeScript  ·  ishu.fun
    </text>
  </g>

  <!-- ── DIVIDER LINE ── -->
  <line x1="0" y1="157" x2="0" y2="157" stroke="#00FF88" stroke-width="1" stroke-opacity="0.3">
    <animate attributeName="x2" from="0" to="900" dur="0.8s" begin="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </line>

  <!-- ── STAT BLOCKS ── -->
  <!-- Stat 1: Repos -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.8s" fill="freeze"/>
    <rect x="55" y="168" width="185" height="64" rx="8" fill="#00FF88" fill-opacity="0.05" stroke="#00FF88" stroke-width="1" stroke-opacity="0.25">
      <animate attributeName="stroke-opacity" values="0.25;0.7;0.25" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="147" y="193" fill="#00FF88" font-family="monospace" font-size="28" font-weight="900" text-anchor="middle" filter="url(#softGlow)">67+</text>
    <text x="147" y="214" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="2">REPOSITORIES</text>
    <rect x="55" y="168" width="4" height="64" rx="2" fill="#00FF88"/>
  </g>
  <!-- Stat 2: Commits -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.0s" fill="freeze"/>
    <rect x="258" y="168" width="185" height="64" rx="8" fill="#00E5FF" fill-opacity="0.05" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.25">
      <animate attributeName="stroke-opacity" values="0.25;0.7;0.25" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <text x="350" y="193" fill="#00E5FF" font-family="monospace" font-size="28" font-weight="900" text-anchor="middle" filter="url(#softGlow)">400+</text>
    <text x="350" y="214" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="2">COMMITS</text>
    <rect x="258" y="168" width="4" height="64" rx="2" fill="#00E5FF"/>
  </g>
  <!-- Stat 3: TypeScript -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.2s" fill="freeze"/>
    <rect x="461" y="168" width="185" height="64" rx="8" fill="#C084FC" fill-opacity="0.05" stroke="#C084FC" stroke-width="1" stroke-opacity="0.25">
      <animate attributeName="stroke-opacity" values="0.25;0.7;0.25" dur="2.8s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <text x="553" y="193" fill="#C084FC" font-family="monospace" font-size="28" font-weight="900" text-anchor="middle" filter="url(#softGlow)">87%</text>
    <text x="553" y="214" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="2">TYPESCRIPT</text>
    <rect x="461" y="168" width="4" height="64" rx="2" fill="#C084FC"/>
  </g>
  <!-- Stat 4: IIT -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.4s" fill="freeze"/>
    <rect x="664" y="168" width="185" height="64" rx="8" fill="#FB923C" fill-opacity="0.05" stroke="#FB923C" stroke-width="1" stroke-opacity="0.25">
      <animate attributeName="stroke-opacity" values="0.25;0.7;0.25" dur="4s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
    <text x="756" y="193" fill="#FB923C" font-family="monospace" font-size="28" font-weight="900" text-anchor="middle" filter="url(#softGlow)">#23</text>
    <text x="756" y="214" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="2">IIT NIRF RANK</text>
    <rect x="664" y="168" width="4" height="64" rx="2" fill="#FB923C"/>
  </g>

  <!-- ── SOCIAL LINKS ROW ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="2.8s" fill="freeze"/>
    <!-- WA -->
    <rect x="55"  y="248" width="148" height="44" rx="6" fill="#25D366" fill-opacity="0.1" stroke="#25D366" stroke-width="1" stroke-opacity="0.4"/>
    <text x="129" y="274" fill="#25D366" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">📞 WhatsApp</text>
    <!-- LinkedIn -->
    <rect x="213" y="248" width="148" height="44" rx="6" fill="#0077B5" fill-opacity="0.1" stroke="#0077B5" stroke-width="1" stroke-opacity="0.4"/>
    <text x="287" y="274" fill="#5ab4d6" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">💼 LinkedIn</text>
    <!-- YouTube -->
    <rect x="371" y="248" width="148" height="44" rx="6" fill="#FF0000" fill-opacity="0.1" stroke="#FF4444" stroke-width="1" stroke-opacity="0.4"/>
    <text x="445" y="274" fill="#FF6B6B" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">▶️ YouTube</text>
    <!-- Instagram -->
    <rect x="529" y="248" width="148" height="44" rx="6" fill="#E1306C" fill-opacity="0.1" stroke="#E1306C" stroke-width="1" stroke-opacity="0.4"/>
    <text x="603" y="274" fill="#E1306C" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">📸 Instagram</text>
    <!-- ishu.fun -->
    <rect x="687" y="248" width="162" height="44" rx="6" fill="#00FF88" fill-opacity="0.1" stroke="#00FF88" stroke-width="1" stroke-opacity="0.4"/>
    <text x="768" y="274" fill="#00FF88" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">🌐 ishu.fun</text>
  </g>

  <!-- Outer border with animated glow -->
  <rect x="0.5" y="0.5" width="899" height="309" rx="13.5" fill="none" stroke="url(#nameGrad)" stroke-width="1.5" stroke-opacity="0.35">
    <animate attributeName="stroke-opacity" values="0.35;0.7;0.35" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
