<svg width="900" height="310" viewBox="0 0 900 310" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a0f"/>
      <stop offset="50%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#060a0f"/>
    </linearGradient>
    <!-- Three static gradients for the cycling name color effect -->
    <linearGradient id="ng1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="50%" stop-color="#7EE787"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="ng2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="ng3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="50%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <filter id="heroGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bgBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="heroBounds"><rect width="900" height="310" rx="14"/></clipPath>
  </defs>

  <rect width="900" height="310" rx="14" fill="url(#heroBg)"/>

  <!-- Background ambient glow blobs -->
  <ellipse cx="180" cy="130" rx="200" ry="140" fill="#00FF88" filter="url(#bgBlur)" opacity="0.07"/>
  <ellipse cx="720" cy="180" rx="220" ry="150" fill="#C084FC" filter="url(#bgBlur)" opacity="0.07"/>
  <ellipse cx="450" cy="50"  rx="150" ry="90"  fill="#00E5FF" filter="url(#bgBlur)" opacity="0.05"/>

  <!-- Subtle dot grid -->
  <g clip-path="url(#heroBounds)" opacity="0.06">
    <line x1="0" y1="52"  x2="900" y2="52"  stroke="#00FF88" stroke-width="0.5"/>
    <line x1="0" y1="104" x2="900" y2="104" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="0" y1="156" x2="900" y2="156" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="0" y1="208" x2="900" y2="208" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="0" y1="260" x2="900" y2="260" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="90"  y1="0" x2="90"  y2="310" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="310" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="270" y1="0" x2="270" y2="310" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="310" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="310" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="310" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="630" y1="0" x2="630" y2="310" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="310" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="810" y1="0" x2="810" y2="310" stroke="#00FF88" stroke-width="0.5"/>
  </g>

  <!-- Scanning line — top to bottom, loops -->
  <g clip-path="url(#heroBounds)">
    <line x1="0" y1="0" x2="900" y2="0" stroke="#00FF88" stroke-width="2" stroke-opacity="0.5" filter="url(#softGlow)">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,312" dur="5s" repeatCount="indefinite" calcMode="linear"/>
    </line>
  </g>

  <!-- Floating particles -->
  <circle cx="72"  cy="42"  r="2"   fill="#00FF88" opacity="0.6"><animate attributeName="cy" values="42;32;42"   dur="4.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;1;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="828" cy="68"  r="1.5" fill="#00E5FF" opacity="0.5"><animate attributeName="cy" values="68;56;68"   dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="155" cy="258" r="2"   fill="#C084FC" opacity="0.4"><animate attributeName="cx" values="155;168;155" dur="5.1s" repeatCount="indefinite"/></circle>
  <circle cx="748" cy="244" r="2"   fill="#FB923C" opacity="0.4"><animate attributeName="cy" values="244;232;244" dur="4.7s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="292" r="1.5" fill="#00FF88" opacity="0.35"><animate attributeName="cx" values="450;464;450" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="28"  cy="172" r="1.5" fill="#00E5FF" opacity="0.4"><animate attributeName="cy" values="172;160;172" dur="3.8s" repeatCount="indefinite"/></circle>
  <circle cx="874" cy="148" r="2"   fill="#C084FC" opacity="0.35"><animate attributeName="cy" values="148;136;148" dur="4.3s" repeatCount="indefinite"/></circle>
  <circle cx="310" cy="22"  r="1.5" fill="#7EE787" opacity="0.4"><animate attributeName="cx" values="310;298;310" dur="5.8s" repeatCount="indefinite"/></circle>
  <circle cx="590" cy="288" r="1.5" fill="#FB923C" opacity="0.35"><animate attributeName="cx" values="590;604;590" dur="4.5s" repeatCount="indefinite"/></circle>

  <!-- ── TOP ROLE BADGE ── -->
  <rect x="314" y="16" width="272" height="24" rx="12" fill="#00FF88" fill-opacity="0.1" stroke="#00FF88" stroke-width="1" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="32" fill="#00FF88" font-family="'Courier New',monospace" font-size="10.5" font-weight="700" text-anchor="middle" letter-spacing="3.5">⚡  FULL STACK DEVELOPER  ⚡</text>

  <!-- ── MAIN NAME — 3-layer opacity cycling for color shift (no stop-color animation) ── -->
  <!-- Glow layer -->
  <text x="450" y="110" fill="url(#ng1)" font-family="'Courier New',Courier,monospace" font-size="68" font-weight="900" text-anchor="middle" letter-spacing="6" filter="url(#heroGlow)" opacity="1">
    <animate attributeName="opacity" values="1;1;1;0;0;0;1;1" dur="9s" repeatCount="indefinite"/>
    ISHU KUMAR
  </text>
  <text x="450" y="110" fill="url(#ng2)" font-family="'Courier New',Courier,monospace" font-size="68" font-weight="900" text-anchor="middle" letter-spacing="6" filter="url(#heroGlow)" opacity="0">
    <animate attributeName="opacity" values="0;0;0;1;1;1;0;0" dur="9s" repeatCount="indefinite"/>
    ISHU KUMAR
  </text>
  <text x="450" y="110" fill="url(#ng3)" font-family="'Courier New',Courier,monospace" font-size="68" font-weight="900" text-anchor="middle" letter-spacing="6" filter="url(#heroGlow)" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0;1;1;0" dur="9s" repeatCount="indefinite"/>
    ISHU KUMAR
  </text>

  <!-- ── SUBTITLE ── -->
  <text x="450" y="142" fill="#8b949e" font-family="'Courier New',monospace" font-size="13.5" font-weight="600" text-anchor="middle" letter-spacing="1.5">
    IIT Patna  ·  CSE 2027  ·  TypeScript  ·  ishu.fun
  </text>

  <!-- ── ANIMATED DIVIDER LINE ── -->
  <line x1="0" y1="159" x2="0" y2="159" stroke="#00FF88" stroke-width="1" stroke-opacity="0.4">
    <animate attributeName="x2" from="0" to="900" dur="1s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </line>

  <!-- ── STAT BLOCKS (4) ── -->
  <!-- Repos -->
  <rect x="46"  y="168" width="190" height="66" rx="8" fill="#0d1117" stroke="#00FF88" stroke-width="1.2">
    <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="46" y="168" width="4" height="66" rx="2" fill="#00FF88"/>
  <text x="141" y="196" fill="#00FF88" font-family="monospace" font-size="30" font-weight="900" text-anchor="middle" filter="url(#softGlow)">67+</text>
  <text x="141" y="218" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="2">REPOSITORIES</text>

  <!-- Commits -->
  <rect x="254" y="168" width="190" height="66" rx="8" fill="#0d1117" stroke="#00E5FF" stroke-width="1.2">
    <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3.8s" begin="0.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="254" y="168" width="4" height="66" rx="2" fill="#00E5FF"/>
  <text x="349" y="196" fill="#00E5FF" font-family="monospace" font-size="30" font-weight="900" text-anchor="middle" filter="url(#softGlow)">400+</text>
  <text x="349" y="218" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="2">COMMITS</text>

  <!-- TypeScript -->
  <rect x="462" y="168" width="190" height="66" rx="8" fill="#0d1117" stroke="#C084FC" stroke-width="1.2">
    <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="2.9s" begin="0.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="462" y="168" width="4" height="66" rx="2" fill="#C084FC"/>
  <text x="557" y="196" fill="#C084FC" font-family="monospace" font-size="30" font-weight="900" text-anchor="middle" filter="url(#softGlow)">87%</text>
  <text x="557" y="218" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="2">TYPESCRIPT</text>

  <!-- IIT Rank -->
  <rect x="670" y="168" width="190" height="66" rx="8" fill="#0d1117" stroke="#FB923C" stroke-width="1.2">
    <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="4.2s" begin="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="670" y="168" width="4" height="66" rx="2" fill="#FB923C"/>
  <text x="765" y="196" fill="#FB923C" font-family="monospace" font-size="30" font-weight="900" text-anchor="middle" filter="url(#softGlow)">#23</text>
  <text x="765" y="218" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="2">IIT NIRF RANK</text>

  <!-- ── SOCIAL LINKS ROW ── -->
  <rect x="46"  y="252" width="152" height="42" rx="7" fill="#25D366" fill-opacity="0.1" stroke="#25D366" stroke-width="1" stroke-opacity="0.45"/>
  <text x="122"  y="277" fill="#25D366" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">📞 WhatsApp</text>

  <rect x="210" y="252" width="152" height="42" rx="7" fill="#0A66C2" fill-opacity="0.1" stroke="#0A66C2" stroke-width="1" stroke-opacity="0.45"/>
  <text x="286" y="277" fill="#5ab4d6" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">💼 LinkedIn</text>

  <rect x="374" y="252" width="152" height="42" rx="7" fill="#FF0000" fill-opacity="0.1" stroke="#FF4444" stroke-width="1" stroke-opacity="0.45"/>
  <text x="450" y="277" fill="#FF6B6B" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">▶ YouTube</text>

  <rect x="538" y="252" width="152" height="42" rx="7" fill="#E1306C" fill-opacity="0.1" stroke="#E1306C" stroke-width="1" stroke-opacity="0.45"/>
  <text x="614" y="277" fill="#E1306C" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">📸 Instagram</text>

  <rect x="702" y="252" width="158" height="42" rx="7" fill="#00FF88" fill-opacity="0.1" stroke="#00FF88" stroke-width="1.5" stroke-opacity="0.6">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="781" y="277" fill="#00FF88" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">🌐 ishu.fun</text>

  <!-- Outer animated border -->
  <rect x="0.5" y="0.5" width="899" height="309" rx="13.5" fill="none" stroke="#00FF88" stroke-width="1.5" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="stroke" values="#00FF88;#00E5FF;#C084FC;#00FF88" dur="9s" repeatCount="indefinite"/>
  </rect>
</svg>
