<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tsBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="jsBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0099BB"/>
    </linearGradient>
    <linearGradient id="pyBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="cppBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1f12"/>
    </linearGradient>
    <filter id="glow-ts">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-title">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="12" fill="url(#bgGrad)"/>
  <!-- Border glow -->
  <rect x="0.5" y="0.5" width="899" height="259" rx="11.5" fill="none" stroke="#00FF88" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Inner subtle line top -->
  <rect x="20" y="50" width="860" height="1" fill="#00FF88" fill-opacity="0.15"/>

  <!-- Title -->
  <text x="450" y="34" fill="#00FF88" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="900" text-anchor="middle" letter-spacing="6" filter="url(#glow-title)">◈  LANGUAGE  MASTERY  ◈</text>

  <!-- ── TypeScript ── -->
  <text x="24" y="88" fill="#8b949e" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="600">TypeScript</text>
  <text x="158" y="88" fill="#00FF88" font-family="'Courier New', Courier, monospace" font-size="11">87%</text>
  <!-- Track -->
  <rect x="200" y="74" width="640" height="18" rx="9" fill="#161b22"/>
  <!-- Bar -->
  <rect x="200" y="74" width="1" height="18" rx="9" fill="url(#tsBar)" filter="url(#glow-ts)">
    <animate attributeName="width" from="1" to="557" dur="1.8s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <!-- Star badge -->
  <text x="866" y="88" fill="#00FF88" font-family="monospace" font-size="11" text-anchor="end" opacity="0">★ PRIMARY
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2s" fill="freeze"/>
  </text>

  <!-- ── JavaScript ── -->
  <text x="24" y="138" fill="#8b949e" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="600">JavaScript</text>
  <text x="158" y="138" fill="#00E5FF" font-family="'Courier New', Courier, monospace" font-size="11">07%</text>
  <rect x="200" y="124" width="640" height="18" rx="9" fill="#161b22"/>
  <rect x="200" y="124" width="1" height="18" rx="9" fill="url(#jsBar)">
    <animate attributeName="width" from="1" to="45" dur="1.8s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- ── Python ── -->
  <text x="24" y="188" fill="#8b949e" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="600">Python</text>
  <text x="158" y="188" fill="#C084FC" font-family="'Courier New', Courier, monospace" font-size="11">05%</text>
  <rect x="200" y="174" width="640" height="18" rx="9" fill="#161b22"/>
  <rect x="200" y="174" width="1" height="18" rx="9" fill="url(#pyBar)">
    <animate attributeName="width" from="1" to="32" dur="1.8s" begin="0.9s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- ── C++ ── -->
  <text x="24" y="238" fill="#8b949e" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="600">C++</text>
  <text x="158" y="238" fill="#FB923C" font-family="'Courier New', Courier, monospace" font-size="11">01%</text>
  <rect x="200" y="224" width="640" height="18" rx="9" fill="#161b22"/>
  <rect x="200" y="224" width="1" height="18" rx="9" fill="url(#cppBar)">
    <animate attributeName="width" from="1" to="6" dur="1.8s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
</svg>
