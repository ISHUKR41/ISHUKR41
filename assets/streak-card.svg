<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgSK" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0a1208"/>
    </linearGradient>
    <filter id="gSK"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gSK2"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"  stop-color="#FF6B00"/>
      <stop offset="50%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="12" fill="url(#bgSK)"/>
  <rect x="0.5" y="0.5" width="899" height="199" rx="11.5" fill="none" stroke="#FB923C" stroke-width="1.5" stroke-opacity="0.4">
    <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- BLOCK 1: TOTAL CONTRIBUTIONS — x=18 w=268 -->
  <rect x="18" y="18" width="268" height="164" rx="8" fill="#161b22"/>
  <rect x="18" y="18" width="268" height="164" rx="8" fill="none" stroke="#00E5FF" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.3;0.75;0.3" dur="3.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="18" y="18" width="4" height="164" rx="2" fill="#00E5FF"/>
  <text x="152" y="48" fill="#00E5FF" font-family="monospace" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="2">📅 TOTAL CONTRIBUTIONS</text>
  <text x="152" y="110" fill="#00E5FF" font-family="'Courier New',monospace" font-size="48" font-weight="900" text-anchor="middle" filter="url(#gSK)">400<tspan font-size="22">+</tspan></text>
  <!-- animated bar -->
  <rect x="34" y="128" width="234" height="5" rx="2" fill="#0d1117"/>
  <rect x="34" y="128" width="0" height="5" rx="2" fill="#00E5FF" filter="url(#gSK2)">
    <animate attributeName="width" from="0" to="234" dur="2s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="152" y="154" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">Aug 2023 → Jun 2026 🔥</text>
  <text x="152" y="170" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">building every day ⚡</text>

  <!-- BLOCK 2: CURRENT STREAK (FLAME) — x=314 w=268 -->
  <rect x="314" y="18" width="268" height="164" rx="8" fill="#161b22"/>
  <rect x="314" y="18" width="268" height="164" rx="8" fill="none" stroke="#FB923C" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="314" y="18" width="4" height="164" rx="2" fill="#FB923C"/>
  <text x="448" y="48" fill="#FB923C" font-family="monospace" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="2">🔥 CURRENT STREAK</text>
  <!-- Flame icon -->
  <text x="448" y="88" fill="url(#fireGrad)" font-family="monospace" font-size="36" text-anchor="middle" filter="url(#gSK)">
    🔥
    <animateTransform attributeName="transform" type="scale" values="1,1;1.1,1.1;1,1" dur="1.5s" additive="sum" repeatCount="indefinite"/>
  </text>
  <text x="448" y="116" fill="#FB923C" font-family="'Courier New',monospace" font-size="28" font-weight="900" text-anchor="middle" filter="url(#gSK)">ACTIVE</text>
  <text x="448" y="136" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">1000+ days coding</text>
  <!-- pulsing dot -->
  <circle cx="448" cy="155" r="4" fill="#FB923C">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;6;4" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="462" y="159" fill="#FB923C" font-family="monospace" font-size="9" font-weight="700">CURRENTLY BUILDING</text>

  <!-- BLOCK 3: LONGEST STREAK — x=610 w=272 -->
  <rect x="610" y="18" width="272" height="164" rx="8" fill="#161b22"/>
  <rect x="610" y="18" width="272" height="164" rx="8" fill="none" stroke="#00FF88" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.3;0.75;0.3" dur="3.8s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="610" y="18" width="4" height="164" rx="2" fill="#00FF88"/>
  <text x="746" y="48" fill="#00FF88" font-family="monospace" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="2">⭐ REPOSITORIES</text>
  <text x="746" y="110" fill="#00FF88" font-family="'Courier New',monospace" font-size="48" font-weight="900" text-anchor="middle" filter="url(#gSK)">67<tspan font-size="22">+</tspan></text>
  <rect x="626" y="128" width="238" height="5" rx="2" fill="#0d1117"/>
  <rect x="626" y="128" width="0" height="5" rx="2" fill="#00FF88" filter="url(#gSK2)">
    <animate attributeName="width" from="0" to="238" dur="2s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="746" y="154" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">TypeScript · 87% dominant</text>
  <text x="746" y="170" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">all real products 🚀</text>
</svg>
