<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="scBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0a0d0f"/>
    </linearGradient>
    <linearGradient id="scFire" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/><stop offset="40%" stop-color="#FF6B00"/><stop offset="100%" stop-color="#FF0000"/>
    </linearGradient>
    <linearGradient id="scGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700"/><stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="scG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/><stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <filter id="scGlow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="scFireBlur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="900" height="180" rx="14" fill="url(#scBg)"/>
  <rect x="0.5" y="0.5" width="899" height="179" rx="13.5" fill="none" stroke="#FB923C" stroke-width="1.2" stroke-opacity="0.4">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Fire glow background -->
  <ellipse cx="200" cy="100" rx="120" ry="70" fill="#FF4400" filter="url(#scFireBlur)" opacity="0.15">
    <animate attributeName="ry" values="70;80;70" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="1.8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Left: Current Streak -->
  <text x="200" y="25" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="3">CURRENT STREAK</text>

  <!-- Animated flame using polygon shapes -->
  <g transform="translate(200,130)">
    <!-- Outer flame -->
    <ellipse cx="0" cy="-28" rx="22" ry="32" fill="url(#scFire)" opacity="0.8" filter="url(#scGlow)">
      <animate attributeName="rx" values="22;26;20;24;22" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="32;36;30;34;32" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="-28;-32;-26;-30;-28" dur="0.9s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Inner flame -->
    <ellipse cx="0" cy="-22" rx="12" ry="20" fill="#FFD700" opacity="0.9">
      <animate attributeName="rx" values="12;14;10;13;12" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="20;24;18;22;20" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="-22;-26;-20;-24;-22" dur="0.7s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Core -->
    <ellipse cx="0" cy="-18" rx="5" ry="10" fill="#FFFFFF" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.6;0.9;0.7" dur="0.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Streak number -->
  <text x="200" y="96" fill="url(#scGold)" font-family="'Courier New',monospace" font-size="52" font-weight="900" text-anchor="middle" filter="url(#scGlow)">47</text>
  <text x="200" y="118" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle">days in a row 🔥</text>

  <!-- Dividers -->
  <line x1="390" y1="20" x2="390" y2="160" stroke="#21262d" stroke-width="1"/>
  <line x1="680" y1="20" x2="680" y2="160" stroke="#21262d" stroke-width="1"/>

  <!-- Center: Total Contributions -->
  <text x="535" y="25" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="3">TOTAL CONTRIBUTIONS</text>
  <text x="535" y="90" fill="url(#scG)" font-family="'Courier New',monospace" font-size="52" font-weight="900" text-anchor="middle" filter="url(#scGlow)">400+</text>
  <text x="535" y="112" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle">commits · PRs · issues</text>
  <!-- Mini calendar dots -->
  <g transform="translate(430,128)">
    <rect x="0" y="0" width="13" height="8" rx="2" fill="#39d353" opacity="0.8"/><rect x="16" y="0" width="13" height="8" rx="2" fill="#39d353" opacity="0.8"/><rect x="32" y="0" width="13" height="8" rx="2" fill="#26a641" opacity="0.8"/><rect x="48" y="0" width="13" height="8" rx="2" fill="#0e4429" opacity="0.8"/><rect x="64" y="0" width="13" height="8" rx="2" fill="#161b22" opacity="0.8"/><rect x="80" y="0" width="13" height="8" rx="2" fill="#0e4429" opacity="0.8"/><rect x="96" y="0" width="13" height="8" rx="2" fill="#00FF88" opacity="0.8"/><rect x="0" y="10" width="13" height="8" rx="2" fill="#00FF88" opacity="0.8"/><rect x="16" y="10" width="13" height="8" rx="2" fill="#161b22" opacity="0.8"/><rect x="32" y="10" width="13" height="8" rx="2" fill="#00FF88" opacity="0.8"/><rect x="48" y="10" width="13" height="8" rx="2" fill="#39d353" opacity="0.8"/><rect x="64" y="10" width="13" height="8" rx="2" fill="#39d353" opacity="0.8"/><rect x="80" y="10" width="13" height="8" rx="2" fill="#00FF88" opacity="0.8"/><rect x="96" y="10" width="13" height="8" rx="2" fill="#00FF88" opacity="0.8"/><rect x="0" y="20" width="13" height="8" rx="2" fill="#39d353" opacity="0.8"/><rect x="16" y="20" width="13" height="8" rx="2" fill="#00FF88" opacity="0.8"/><rect x="32" y="20" width="13" height="8" rx="2" fill="#161b22" opacity="0.8"/><rect x="48" y="20" width="13" height="8" rx="2" fill="#161b22" opacity="0.8"/><rect x="64" y="20" width="13" height="8" rx="2" fill="#0e4429" opacity="0.8"/><rect x="80" y="20" width="13" height="8" rx="2" fill="#26a641" opacity="0.8"/><rect x="96" y="20" width="13" height="8" rx="2" fill="#0e4429" opacity="0.8"/>
  </g>

  <!-- Right: Longest Streak -->
  <text x="790" y="25" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="3">LONGEST STREAK</text>
  <text x="790" y="90" fill="#C084FC" font-family="'Courier New',monospace" font-size="52" font-weight="900" text-anchor="middle" filter="url(#scGlow)">63</text>
  <text x="790" y="112" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle">personal best 🏆</text>
  <!-- Trophy icon -->
  <g transform="translate(790,125)">
    <text y="15" fill="#C084FC" font-family="monospace" font-size="22" text-anchor="middle" filter="url(#scGlow)">🏆</text>
    <animate attributeName="transform" type="rotate" values="0 790 140;5 790 140;-5 790 140;0 790 140" dur="3s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Bottom bar -->
  <rect x="20" y="170" width="860" height="3" rx="1.5" fill="#21262d"/>
  <rect x="20" y="170" width="0" height="3" rx="1.5" fill="url(#scG)">
    <animate attributeName="width" from="0" to="860" dur="2s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  </svg>