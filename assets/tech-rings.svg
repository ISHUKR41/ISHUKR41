<svg width="900" height="252" viewBox="0 0 900 252" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0d1f14"/>
    </linearGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="g3"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gt"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- BG -->
  <rect width="900" height="252" rx="12" fill="url(#bgR)"/>
  <rect x="0.5" y="0.5" width="899" height="251" rx="11.5" fill="none" stroke="#00FF88" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Title -->
  <text x="450" y="30" fill="#00FF88" font-family="'Courier New',monospace" font-size="12" font-weight="900" text-anchor="middle" letter-spacing="5" filter="url(#gt)">◈  CORE  SKILL  PROFICIENCY  ◈</text>
  <rect x="20" y="40" width="860" height="1" fill="#00FF88" fill-opacity="0.12"/>

  <!-- circumference for r=48: 2*π*48 = 301.59 -->
  <!-- dashoffset for start at top: -301.59/4 = -75.4 -->

  <!-- ── TypeScript 87% — #00FF88 ── x=75 -->
  <circle cx="75" cy="140" r="48" fill="none" stroke="#161b22" stroke-width="7"/>
  <circle cx="75" cy="140" r="48" fill="none" stroke="#00FF88" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="0 301.6" stroke-dashoffset="-75.4" transform="rotate(-90 75 140)" filter="url(#g1)">
    <animate attributeName="stroke-dasharray" from="0 301.6" to="262.4 301.6" dur="2s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </circle>
  <text x="75" y="136" fill="#00FF88" font-family="monospace" font-size="13" font-weight="900" text-anchor="middle" filter="url(#g1)">87%</text>
  <text x="75" y="150" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">★ PRIMARY</text>
  <text x="75" y="206" fill="#c9d1d9" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">TypeScript</text>
  <text x="75" y="221" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">LANGUAGE</text>

  <!-- ── React 85% — #00E5FF ── x=225 -->
  <circle cx="225" cy="140" r="48" fill="none" stroke="#161b22" stroke-width="7"/>
  <circle cx="225" cy="140" r="48" fill="none" stroke="#00E5FF" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="0 301.6" stroke-dashoffset="-75.4" transform="rotate(-90 225 140)" filter="url(#g2)">
    <animate attributeName="stroke-dasharray" from="0 301.6" to="256.4 301.6" dur="2s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
