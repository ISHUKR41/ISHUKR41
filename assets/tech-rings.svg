  <text x="225" y="136" fill="#00E5FF" font-family="monospace" font-size="13" font-weight="900" text-anchor="middle" filter="url(#g2)">85%</text>
  <text x="225" y="150" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">FRONTEND</text>
  <text x="225" y="206" fill="#c9d1d9" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">React</text>
  <text x="225" y="221" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">LIBRARY</text>

  <!-- ── Node.js 80% — #C084FC ── x=375 -->
