  <text x="825" y="136" fill="#FF6B6B" font-family="monospace" font-size="13" font-weight="900" text-anchor="middle">70%</text>
  <text x="825" y="150" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">DATABASE</text>
  <text x="825" y="206" fill="#c9d1d9" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">PostgreSQL</text>
  <text x="825" y="221" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">DATABASE</text>

  <!-- Bottom -->
  <rect x="20" y="236" width="860" height="1" fill="#00FF88" fill-opacity="0.1"/>
  <text x="450" y="249" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle" letter-spacing="3">SELF · ASSESSED · SKILL · RATINGS · 2026</text>
</svg>
