  <text x="525" y="136" fill="#FB923C" font-family="monospace" font-size="13" font-weight="900" text-anchor="middle">76%</text>
  <text x="525" y="150" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">AI/ML</text>
  <text x="525" y="206" fill="#c9d1d9" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">Python</text>
  <text x="525" y="221" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">LANGUAGE</text>

  <!-- ── Next.js 82% — #7EE787 ── x=675 -->
  <circle cx="675" cy="140" r="48" fill="none" stroke="#161b22" stroke-width="7"/>
  <circle cx="675" cy="140" r="48" fill="none" stroke="#7EE787" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="0 301.6" stroke-dashoffset="-75.4" transform="rotate(-90 675 140)">
