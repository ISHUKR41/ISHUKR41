  <text x="375" y="206" fill="#c9d1d9" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">Node.js</text>
  <text x="375" y="221" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">RUNTIME</text>

  <!-- ── Python 76% — #FB923C ── x=525 -->
  <circle cx="525" cy="140" r="48" fill="none" stroke="#161b22" stroke-width="7"/>
  <circle cx="525" cy="140" r="48" fill="none" stroke="#FB923C" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="0 301.6" stroke-dashoffset="-75.4" transform="rotate(-90 525 140)">
    <animate attributeName="stroke-dasharray" from="0 301.6" to="229.2 301.6" dur="2s" begin="0.9s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
