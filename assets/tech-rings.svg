  <text x="675" y="206" fill="#c9d1d9" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">Next.js</text>
  <text x="675" y="221" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">FRAMEWORK</text>

  <!-- ── PostgreSQL 70% — #FF6B6B ── x=825 -->
  <circle cx="825" cy="140" r="48" fill="none" stroke="#161b22" stroke-width="7"/>
  <circle cx="825" cy="140" r="48" fill="none" stroke="#FF6B6B" stroke-width="7" stroke-linecap="round"
