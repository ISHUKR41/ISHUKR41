  <text x="450" y="28" fill="#00FF88" font-family="'Courier New',monospace" font-size="13" font-weight="900" text-anchor="middle" letter-spacing="5" filter="url(#gS)">◈  ISHU  KUMAR  ·  GITHUB  STATS  ◈</text>
  <rect x="20" y="38" width="860" height="1" fill="#00FF88" fill-opacity="0.12"/>

