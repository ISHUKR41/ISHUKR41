<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#090d13"/>
    </linearGradient>
    <linearGradient id="gsG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/><stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="gsP" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C084FC"/><stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <filter id="gsGlow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gsSoft"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="200" rx="14" fill="url(#gsBg)"/>
  <rect x="0.5" y="0.5" width="899" height="199" rx="13.5" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="24" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="4">◈  GITHUB  STATISTICS  ◈</text>
  <line x1="60" y1="32" x2="840" y2="32" stroke="#21262d" stroke-width="1"/>

  <!-- 5 animated stat cards -->
  <!-- CARD 1: Total Stars -->
  <rect x="18" y="44" width="158" height="140" rx="10" fill="#0d1117" stroke="#00FF88" stroke-width="1.2" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="18" y="44" width="158" height="4" rx="2" fill="url(#gsG)"/>
  <text x="97" y="90" fill="#00FF88" font-family="'Courier New',monospace" font-size="36" font-weight="900" text-anchor="middle" filter="url(#gsGlow)">★</text>
  <text x="97" y="120" fill="#00FF88" font-family="'Courier New',monospace" font-size="28" font-weight="900" text-anchor="middle" filter="url(#gsGlow)">124</text>
  <text x="97" y="138" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle" letter-spacing="1.5">TOTAL STARS</text>
  <text x="97" y="166" fill="#30363d" font-family="monospace" font-size="9" text-anchor="middle">★★★★☆</text>
  <rect x="18" y="181" width="158" height="3" rx="1.5" fill="#21262d"/>
  <rect x="18" y="181" width="124" height="3" rx="1.5" fill="#00FF88">
    <animate attributeName="width" from="0" to="124" dur="1.5s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- CARD 2: Commits -->
  <rect x="188" y="44" width="158" height="140" rx="10" fill="#0d1117" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3.4s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="188" y="44" width="158" height="4" rx="2" fill="#00E5FF"/>
  <text x="267" y="88" fill="#00E5FF" font-family="'Courier New',monospace" font-size="30" font-weight="900" text-anchor="middle" filter="url(#gsGlow)">⚡</text>
  <text x="267" y="118" fill="#00E5FF" font-family="'Courier New',monospace" font-size="26" font-weight="900" text-anchor="middle" filter="url(#gsGlow)">400+</text>
  <text x="267" y="138" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle" letter-spacing="1.5">TOTAL COMMITS</text>
  <text x="267" y="158" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="middle">2023 → 2026</text>
  <rect x="188" y="181" width="158" height="3" rx="1.5" fill="#21262d"/>
  <rect x="188" y="181" width="110" height="3" rx="1.5" fill="#00E5FF">
    <animate attributeName="width" from="0" to="110" dur="1.5s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- CARD 3: Repos -->
  <rect x="358" y="44" width="184" height="140" rx="10" fill="#0d1117" stroke="#C084FC" stroke-width="1.5" stroke-opacity="0.4">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="358" y="44" width="184" height="5" rx="2.5" fill="url(#gsP)"/>
  <text x="450" y="88" fill="#C084FC" font-family="'Courier New',monospace" font-size="28" font-weight="900" text-anchor="middle" filter="url(#gsSoft)">📦</text>
  <text x="450" y="118" fill="#C084FC" font-family="'Courier New',monospace" font-size="30" font-weight="900" text-anchor="middle" filter="url(#gsGlow)">67+</text>
  <text x="450" y="138" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle" letter-spacing="2">REPOSITORIES</text>
  <text x="450" y="158" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="middle">public + private</text>
  <rect x="358" y="181" width="184" height="4" rx="2" fill="#21262d"/>
  <rect x="358" y="181" width="136" height="4" rx="2" fill="url(#gsP)">
    <animate attributeName="width" from="0" to="136" dur="1.5s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- CARD 4: TypeScript -->
  <rect x="554" y="44" width="158" height="140" rx="10" fill="#0d1117" stroke="#FB923C" stroke-width="1.2" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3.7s" begin="0.7s" repeatCount="indefinite"/>
  </rect>
  <rect x="554" y="44" width="158" height="4" rx="2" fill="#FB923C"/>
  <text x="633" y="90" fill="#FB923C" font-family="'Courier New',monospace" font-size="30" font-weight="900" text-anchor="middle" filter="url(#gsGlow)">TS</text>
  <text x="633" y="120" fill="#FB923C" font-family="'Courier New',monospace" font-size="26" font-weight="900" text-anchor="middle" filter="url(#gsGlow)">87%</text>
  <text x="633" y="138" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle" letter-spacing="1.5">TYPESCRIPT</text>
  <text x="633" y="158" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="middle">top language</text>
  <rect x="554" y="181" width="158" height="3" rx="1.5" fill="#21262d"/>
  <rect x="554" y="181" width="137" height="3" rx="1.5" fill="#FB923C">
    <animate attributeName="width" from="0" to="137" dur="1.5s" begin="1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- CARD 5: PRs -->
  <rect x="724" y="44" width="158" height="140" rx="10" fill="#0d1117" stroke="#7EE787" stroke-width="1.2" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="4.1s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="724" y="44" width="158" height="4" rx="2" fill="#7EE787"/>
  <text x="803" y="88" fill="#7EE787" font-family="'Courier New',monospace" font-size="28" font-weight="900" text-anchor="middle" filter="url(#gsGlow)">🔀</text>
  <text x="803" y="118" fill="#7EE787" font-family="'Courier New',monospace" font-size="26" font-weight="900" text-anchor="middle" filter="url(#gsGlow)">48+</text>
  <text x="803" y="138" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle" letter-spacing="2">PULL REQUESTS</text>
  <text x="803" y="158" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="middle">merged + open</text>
  <rect x="724" y="181" width="158" height="3" rx="1.5" fill="#21262d"/>
  <rect x="724" y="181" width="95" height="3" rx="1.5" fill="#7EE787">
    <animate attributeName="width" from="0" to="95" dur="1.5s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  </svg>