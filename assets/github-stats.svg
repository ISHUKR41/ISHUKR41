      <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
    <filter id="gS"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gS2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="900" height="220" rx="12" fill="url(#bgS)"/>
