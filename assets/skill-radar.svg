      <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
    <filter id="gR"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gR2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
