  <line x1="220" y1="175" x2="323.9" y2="235" stroke="#8b949e" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="220" y1="175" x2="220" y2="295"  stroke="#8b949e" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="220" y1="175" x2="116.1" y2="235" stroke="#8b949e" stroke-width="0.6" stroke-opacity="0.3"/>
